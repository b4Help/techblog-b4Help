<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% seo %}
  <link rel="icon" type="image/png" href="{{ '/images/b4help_icon.png' | relative_url }}" />
  <link rel="apple-touch-icon" href="{{ '/images/b4help_icon.png' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo">
        <img src="{{ '/images/b4help_logo_light_trans.png' | relative_url }}" alt="b4Help" class="logo-img" />
        <span class="logo-sub">Blog</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="nav-link">Posts</a>
        <a href="{{ '/about/' | relative_url }}" class="nav-link">About</a>
        <a href="https://b4help.com" class="nav-link nav-cta" target="_blank" rel="noopener">b4help.com ↗</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <img src="{{ '/images/b4help_logo_light_trans.png' | relative_url }}" alt="b4Help" class="footer-logo-img" />
        <span class="footer-copy">© {{ site.time | date: '%Y' }} b4Help · AI Consulting · From Infrastructure to Intelligence.</span>
        <a href="https://b4help.com" class="footer-link" target="_blank" rel="noopener">b4help.com ↗</a>
      </div>
    </div>
  </footer>

</body>
</html>
